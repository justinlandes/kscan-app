# TC-000: Critical path smoke test
# Runs the minimal set of checks to confirm the app launches, camera screen
# is reachable, and the preview screen is accessible. Designed to run fast
# in CI on every PR before the full regression suite.
appId: ${APP_ID}
name: "Smoke — Critical Path"
tags:
  - smoke
env:
  APP_ID: ${APP_ID || "com.kscanai.app"}
---
- launchApp:
    permissions:
      camera: allow

- runFlow: ../../subflows/grant-camera-permission.yaml

# Camera screen is up
- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 20000

- waitForAnimationToEnd

- assertVisible: "K-SCAN"
- assertVisible:
    id: "scan-button"

- takeScreenshot: "smoke-camera-screen"

# Preview screen is reachable
- tapOn:
    id: "scan-button"

- extendedWaitUntil:
    visible: "Analyze Style"
    timeout: 8000

- assertVisible: "Analyze Style"
- assertVisible: "Retake"

- takeScreenshot: "smoke-preview-screen"
