# TC-007: Error state — retry and retake actions
# Verifies that when analysis fails, the error UI renders correctly and
# both "Try Again" and "Retake Photo" buttons function as expected.
#
# To reliably reproduce the error state, run this with the backend offline
# or set an invalid API key in your .env before running.
appId: ${APP_ID}
name: "Analysis Error — Retry and Retake"
tags:
  - analysis
  - edge-cases
env:
  APP_ID: ${APP_ID || "com.kscanai.app"}
---
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 20000

# Capture a photo
- tapOn:
    id: "scan-button"

- extendedWaitUntil:
    visible: "Analyze Style"
    timeout: 6000

# Trigger analysis (will fail if backend is offline)
- tapOn: "Analyze Style"

# Wait for error state — "Try Again" button is the indicator
- extendedWaitUntil:
    visible: "Try Again"
    timeout: 35000

- assertVisible: "Try Again"
- assertVisible: "Retake Photo"

- takeScreenshot: "error-state"

# Verify retry re-triggers processing
- tapOn: "Try Again"

- extendedWaitUntil:
    visible: "Analyzing your look"
    timeout: 6000

- assertVisible: "Analyzing your look"

# Go back via Retake Photo (re-launch the flow)
- extendedWaitUntil:
    visible: "Try Again"
    timeout: 35000

- tapOn: "Retake Photo"

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 6000

- assertVisible: "K-SCAN"
- assertVisible:
    id: "scan-button"
