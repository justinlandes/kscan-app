# TC-004: Capture photo → preview screen
# Verifies that tapping the scan button captures a photo and transitions
# to the preview screen showing "Analyze Style" and "Retake" actions.
appId: ${APP_ID}
name: "Capture Photo — Preview Screen"
tags:
  - smoke
  - analysis
env:
  APP_ID: ${APP_ID || "com.kscanai.app"}
---
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 20000

- waitForAnimationToEnd

- tapOn:
    id: "scan-button"

# Wait for preview screen to appear
- extendedWaitUntil:
    visible: "Analyze Style"
    timeout: 6000

- assertVisible: "Look Analyzer"
- assertVisible: "Analyze Style"
- assertVisible: "Retake"
