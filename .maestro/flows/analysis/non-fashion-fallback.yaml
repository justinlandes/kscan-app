# TC-008: Non-fashion fallback — graceful rejection
# Verifies that when the AI identifies a non-fashion image, the app shows
# a clear "Not a Fashion Item" message (not an error state) with a
# "Scan Again" CTA that resets to the camera screen.
#
# HOW TO REPRODUCE:
#   Point the camera at a clearly non-fashion subject (a book, a plant, a
#   food item) before running this flow. The emulator front/rear camera
#   shows a static test scene — it will typically pass the non-fashion
#   gate if the scene contains no garments.
#
# NOTE: This flow cannot force a non-fashion result — it verifies the UI
#   handles it correctly IF the AI returns NON_FASHION. Run manually or
#   pair with a dedicated backend mock for CI.
appId: ${APP_ID}
name: "Non-Fashion — Graceful Fallback"
tags:
  - analysis
  - edge-cases
env:
  APP_ID: ${APP_ID || "com.kscanai.app"}
---
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 20000

- tapOn:
    id: "scan-button"

- extendedWaitUntil:
    visible: "Analyze Style"
    timeout: 6000

- tapOn: "Analyze Style"

# Wait for either a result card (fashion) or the non-fashion panel
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "analysis-card"
      - visible: "Not a Fashion Item"
    timeout: 35000

# If the result card appeared, this is a fashion result — skip this test
- runFlow:
    when:
      visible:
        id: "analysis-card"
    commands:
      - takeScreenshot: "non-fashion-SKIP-got-fashion-result"

# Non-fashion path: validate the panel and reset
- runFlow:
    when:
      visible: "Not a Fashion Item"
    commands:
      - assertVisible: "Not a Fashion Item"
      - assertVisible: "Scan Again"
      - takeScreenshot: "non-fashion-panel"
      - tapOn: "Scan Again"
      - extendedWaitUntil:
          visible:
            id: "scan-button"
          timeout: 6000
      - assertVisible: "K-SCAN"
      - assertVisible:
          id: "scan-button"
      - takeScreenshot: "non-fashion-reset-to-camera"
