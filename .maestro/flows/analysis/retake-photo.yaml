# TC-005: Retake — discard preview and return to camera
# Verifies the "Retake" button on the preview screen navigates back to
# the camera viewfinder without losing app state.
appId: ${APP_ID}
name: "Retake Photo — Back to Camera"
tags:
  - analysis
env:
  APP_ID: ${APP_ID || "com.kscanai.app"}
---
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 20000

# Capture a photo
- tapOn:
    id: "scan-button"

- extendedWaitUntil:
    visible: "Analyze Style"
    timeout: 6000

# Tap Retake
- tapOn: "Retake"

# Should be back on the camera screen
- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 6000

- assertVisible: "K-SCAN"
- assertVisible:
    id: "scan-button"
