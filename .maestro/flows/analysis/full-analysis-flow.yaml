# TC-006: Full analysis happy path
# Captures a photo → analyzes it → verifies the result card appears with
# style metadata → dismisses the card → returns to camera screen.
#
# BACKEND REQUIREMENT: server.js must be reachable from the device/emulator.
#   Android emulator: set EXPO_PUBLIC_API_URL=http://10.0.2.2:3001 in your .env
#                     (NOT localhost — emulator loopback doesn't reach your machine)
#   Physical device:  set EXPO_PUBLIC_API_URL=http://<your-LAN-IP>:3001
#   iOS simulator:    localhost works fine (shares host network)
appId: ${APP_ID}
name: "Full Analysis — Happy Path"
tags:
  - smoke
  - analysis
  - regression
properties:
  testCaseId: "TC-006"
  priority: "High"
env:
  APP_ID: ${APP_ID || "com.kscanai.app"}
---
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 20000

- waitForAnimationToEnd

# Step 1: Capture
- tapOn:
    id: "scan-button"

- extendedWaitUntil:
    visible: "Analyze Style"
    timeout: 20000

- takeScreenshot: "preview-screen"

# Step 2: Analyze
- tapOn: "Analyze Style"

# Step 3: Processing state — capture screenshot if observable
# (only visible when the backend responds slowly enough for PerceptionLayer to clear first)
- runFlow:
    when:
      visible: "Analyzing your look"
    commands:
      - takeScreenshot: "processing-state"

# Step 4: Wait for result card
# The API call + image compression takes a variable amount of time.
# If the backend is unreachable the client will timeout after 8s and show
# an error state ("Try Again") instead — see BACKEND REQUIREMENT note above.
- extendedWaitUntil:
    visible:
      id: "analysis-card"
    timeout: 30000

- waitForAnimationToEnd

# Fail clearly if the error state appeared instead of the result card
- runFlow:
    when:
      visible: "Try Again"
    commands:
      - takeScreenshot: "FAIL-error-state-instead-of-result"
      - assertVisible:
          id: "analysis-card"   # will fail with a clear message

- assertVisible:
    id: "analysis-card"
- assertVisible: "Scan Again"

- takeScreenshot: "result-card"

# Step 5: Dismiss result card
- tapOn: "Scan Again"

# Step 6: Back to camera
- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 8000

- assertVisible: "K-SCAN"
- assertVisible:
    id: "scan-button"
