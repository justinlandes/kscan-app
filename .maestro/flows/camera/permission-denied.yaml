# TC-002: Camera permission — previously denied
# Verifies the "Grant Access" screen renders correctly when camera
# permission was previously denied.
appId: ${APP_ID}
name: "Camera Permission — Denied State"
tags:
  - camera
  - permissions
  - edge-cases
---
- launchApp:
    clearState: true
    permissions:
      camera: deny

- assertVisible: "K-SCAN"
- assertVisible: "Camera access is currently disabled.*"
- assertVisible: "Grant Access"

# Tapping "Grant Access" should trigger the OS settings prompt
# (on a real device this opens Settings; on simulator it may show OS dialog)
- tapOn: "Grant Access"
