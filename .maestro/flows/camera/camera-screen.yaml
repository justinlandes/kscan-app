# TC-003: Camera screen — idle state elements are visible
# Verifies the camera viewfinder, brand title, and scan button are all
# present and the app is ready to capture.
appId: ${APP_ID}
name: "Camera Screen — Idle State"
tags:
  - smoke
  - camera
env:
  APP_ID: ${APP_ID || "com.kscanai.app"}
---
- launchApp:
    permissions:
      camera: allow

- runFlow: ../../subflows/grant-camera-permission.yaml

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 15000

- waitForAnimationToEnd

- assertVisible: "K-SCAN"
- assertVisible:
    id: "scan-button"
    enabled: true
