# TC-001: Camera permission — first launch, user grants access
# Verifies the app correctly shows the permission prompt and transitions
# to the camera viewfinder after the user grants camera access.
appId: ${APP_ID}
name: "Camera Permission — Grant Access"
tags:
  - smoke
  - camera
  - permissions
---
- launchApp:
    clearState: true
    permissions:
      camera: unset        # unset so the in-app or OS prompt appears

- assertVisible: "K-SCAN"

# Handle in-app permission screen (Grant Access button)
- runFlow: ../../subflows/grant-camera-permission.yaml

# Android: tapping in-app Grant Access triggers an OS permission dialog
- extendedWaitUntil:
    visible: "While using the app"
    timeout: 8000
- tapOn: "While using the app"

# After granting, the camera viewfinder should be active
# 15s: clearState triggers app reinstall on iOS / pm clear on Android — cold start
- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 15000

- waitForAnimationToEnd

- assertVisible: "K-SCAN"
- assertVisible:
    id: "scan-button"
