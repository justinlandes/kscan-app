# Reusable subflow: grant camera permission if the OS dialog appears.
# Called from any flow that needs camera access before interacting.
# Tags: subflow (excluded from direct test runs)
appId: ${APP_ID}
tags:
  - subflow
---
# iOS: system camera permission dialog
- runFlow:
    when:
      visible: ".*Camera.*"
      platform: iOS
    commands:
      - tapOn: "OK"

# Android: system permission dialog
- runFlow:
    when:
      visible: "Allow"
      platform: Android
    commands:
      - tapOn: "While using the app"

# In-app permission screen ("Allow Camera" first-time prompt)
- runFlow:
    when:
      visible: "Allow Camera"
    commands:
      - tapOn: "Allow Camera"

# In-app permission screen (previously denied — "Grant Access")
- runFlow:
    when:
      visible: "Grant Access"
    commands:
      - tapOn: "Grant Access"
