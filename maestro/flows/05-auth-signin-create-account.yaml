# ─────────────────────────────────────────────────────────────────────────────
# Maestro Test 5: Create Account / Sign In Auth Flow
# K Scan AI — Android (emulator or physical device)
# ─────────────────────────────────────────────────────────────────────────────
#
# WHAT THIS PROVES:
#   1. Privacy screen shows "SIGN IN OR CREATE ACCOUNT" CTA when signed out
#   2. Tapping it navigates to the Account Access screen
#   3. Sign In tab and Create Account tab both appear and are switchable
#      via testID selectors (auth-mode-signin, auth-mode-create-account)
#   4. Validation errors fire correctly on empty/invalid input (Sign In mode)
#   5. Validation errors fire correctly for Create Account mode
#      (missing confirm password, passwords don't match)
#   6. Switching back to Sign In hides the Confirm Password field
#   7. Cancel returns to the Privacy screen
#   8. Valid sign-in navigates back and sync chip shows "Saved to Account"
#   9. Sign out resets chip to "Saved to Device"
#
# PREREQUISITES:
#   - App is open (home screen visible)
#   - A valid Supabase test user exists (create at Supabase Dashboard → Auth → Users)
#   - User is currently signed OUT in the app
#   - Set TEST_EMAIL and TEST_PASSWORD below before running
#
# REPEATABILITY:
#   - The flow ends with the user signed out on the Privacy screen, then
#     navigates back to home. A clean second run can start from that state.
#   - If the flow fails partway through Step 11–12 (sign-in path), the user
#     may be left signed in. Manually sign out in the app before re-running.
#
# RUN:
#   maestro test maestro/flows/05-auth-signin-create-account.yaml
#
# SELECTOR NOTES:
#   testID selectors (id:) are preferred over text: for all interactive elements
#   to avoid collisions when "SIGN IN" and "CREATE ACCOUNT" appear in multiple
#   places (header, tab, CTA button) simultaneously.
#
#   privacy-auth-cta           — Pressable CTA on Privacy screen (signed-out)
#   auth-mode-signin           — SIGN IN tab Pressable in auth card
#   auth-mode-create-account   — CREATE ACCOUNT tab Pressable in auth card
#   auth-email-input           — email TextInput
#   auth-password-input        — password TextInput
#   auth-confirm-password-input — confirm password TextInput (create-account only)
#   auth-submit-button         — primary CTA Pressable (SIGN IN / CREATE ACCOUNT)
# ─────────────────────────────────────────────────────────────────────────────

appId: com.kscanai.app
env:
  TEST_EMAIL: "your-test-user@example.com"
  TEST_PASSWORD: "your-test-password"
---

# ════════════════════════════════════════════════════════════════════════════
# STEP 1 — Launch app, arrive at home screen
# ════════════════════════════════════════════════════════════════════════════
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    text: "K SCAN AI"

- takeScreenshot: maestro/screenshots/test5-01-home

# ════════════════════════════════════════════════════════════════════════════
# STEP 2 — Navigate to Privacy screen
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    text: "PRIVACY CONTROL"

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible:
    text: "PRIVACY CONTROL"

# Sync chip must show "Saved to Device" when signed out
- assertVisible:
    text: "Saved to Device"

# Sign in/create-account CTA must be visible when signed out — assert full text
- assertVisible:
    text: "SIGN IN OR CREATE ACCOUNT"

- takeScreenshot: maestro/screenshots/test5-02-privacy-signed-out

# ════════════════════════════════════════════════════════════════════════════
# STEP 3 — Navigate to Account Access screen via CTA
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    id: "privacy-auth-cta"

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible:
    text: "K-SCAN"

# Both mode tabs must be visible
- assertVisible:
    id: "auth-mode-signin"

- assertVisible:
    id: "auth-mode-create-account"

- takeScreenshot: maestro/screenshots/test5-03-auth-screen

# ════════════════════════════════════════════════════════════════════════════
# STEP 4 — Sign In tab: empty submit validation
# ════════════════════════════════════════════════════════════════════════════
# Activate Sign In tab explicitly before submitting
- tapOn:
    id: "auth-mode-signin"

- waitForAnimationToEnd:
    timeout: 500

# Submit with no input — must surface "Enter your email address."
- tapOn:
    id: "auth-submit-button"

- waitForAnimationToEnd:
    timeout: 1000

- assertVisible:
    text: "Enter your email address."

- takeScreenshot: maestro/screenshots/test5-04-signin-empty-error

# ════════════════════════════════════════════════════════════════════════════
# STEP 5 — Sign In tab: invalid email validation
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    id: "auth-email-input"

- inputText: "notanemail"

- tapOn:
    id: "auth-submit-button"

- waitForAnimationToEnd:
    timeout: 1000

- assertVisible:
    text: "Enter a valid email address."

- takeScreenshot: maestro/screenshots/test5-05-signin-invalid-email

# ════════════════════════════════════════════════════════════════════════════
# STEP 6 — Sign In tab: missing password validation
# ════════════════════════════════════════════════════════════════════════════
# Explicitly refocus the email input before clearing to avoid stale focus
- tapOn:
    id: "auth-email-input"

- clearText

- inputText: "test@example.com"

- tapOn:
    id: "auth-submit-button"

- waitForAnimationToEnd:
    timeout: 1000

- assertVisible:
    text: "Enter your password."

- takeScreenshot: maestro/screenshots/test5-06-signin-missing-password

# ════════════════════════════════════════════════════════════════════════════
# STEP 7 — Switch to Create Account tab
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    id: "auth-mode-create-account"

- waitForAnimationToEnd:
    timeout: 1000

# Header and tab must reflect the mode change
- assertVisible:
    text: "CREATE ACCOUNT"

# Confirm password field label must now be visible
- assertVisible:
    text: "CONFIRM PASSWORD"

# testID selector must resolve (field is rendered)
- assertVisible:
    id: "auth-confirm-password-input"

- takeScreenshot: maestro/screenshots/test5-07-create-account-tab

# ════════════════════════════════════════════════════════════════════════════
# STEP 8 — Create Account: missing confirm password validation
# ════════════════════════════════════════════════════════════════════════════
# Email is preserved from Step 6 ("test@example.com") — no need to re-enter.
# Password field is empty; fill it and leave confirm password blank.
- tapOn:
    id: "auth-password-input"

- inputText: "password123"

# Submit with confirm password still empty
- tapOn:
    id: "auth-submit-button"

- waitForAnimationToEnd:
    timeout: 1000

- assertVisible:
    text: "Confirm your password."

- takeScreenshot: maestro/screenshots/test5-08-create-account-confirm-missing

# ════════════════════════════════════════════════════════════════════════════
# STEP 9 — Create Account: passwords don't match validation
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    id: "auth-confirm-password-input"

- inputText: "differentpassword"

- tapOn:
    id: "auth-submit-button"

- waitForAnimationToEnd:
    timeout: 1000

- assertVisible:
    text: "Passwords do not match."

- takeScreenshot: maestro/screenshots/test5-09-create-account-mismatch

# ════════════════════════════════════════════════════════════════════════════
# STEP 10 — Switch back to Sign In: confirm-password field disappears
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    id: "auth-mode-signin"

- waitForAnimationToEnd:
    timeout: 1000

# Confirm password field and label must no longer be visible
- assertNotVisible:
    text: "CONFIRM PASSWORD"

- assertNotVisible:
    id: "auth-confirm-password-input"

- takeScreenshot: maestro/screenshots/test5-10-back-to-signin-no-confirm

# ════════════════════════════════════════════════════════════════════════════
# STEP 11 — Cancel returns to Privacy screen
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    text: "Cancel"

- waitForAnimationToEnd:
    timeout: 1500

- assertVisible:
    text: "PRIVACY CONTROL"

# Confirm we are NOT on the auth screen (no cancel button, no tab row)
- assertNotVisible:
    text: "Cancel"

- takeScreenshot: maestro/screenshots/test5-11-cancel-back-to-privacy

# ════════════════════════════════════════════════════════════════════════════
# STEP 12 — Valid Sign In with test credentials
# ════════════════════════════════════════════════════════════════════════════
# Re-navigate to auth screen (screen remounts, all state is fresh)
- tapOn:
    id: "privacy-auth-cta"

- waitForAnimationToEnd:
    timeout: 1500

# Ensure Sign In mode is active
- tapOn:
    id: "auth-mode-signin"

- waitForAnimationToEnd:
    timeout: 500

- tapOn:
    id: "auth-email-input"

- inputText: ${TEST_EMAIL}

- tapOn:
    id: "auth-password-input"

- inputText: ${TEST_PASSWORD}

- tapOn:
    id: "auth-submit-button"

# Wait for Supabase auth + navigation back (up to 10 s)
- extendedWaitUntil:
    visible:
      text: "PRIVACY CONTROL"
    timeout: 10000

- assertVisible:
    text: "PRIVACY CONTROL"

# Sync chip must update to "Saved to Account" after sign-in
- assertVisible:
    text: "Saved to Account"

# CTA must be gone — user is now authenticated
- assertNotVisible:
    id: "privacy-auth-cta"

- takeScreenshot: maestro/screenshots/test5-12-signed-in-saved-to-account

# ════════════════════════════════════════════════════════════════════════════
# STEP 13 — Sign Out resets chip to "Saved to Device"
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    text: "Sign Out"

- waitForAnimationToEnd:
    timeout: 1000

# Confirm sign-out dialog
- assertVisible:
    text: "Sign Out"

- tapOn:
    text: "Sign Out"
    index: 1

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible:
    text: "Saved to Device"

# CTA must reappear with updated copy
- assertVisible:
    text: "SIGN IN OR CREATE ACCOUNT"

- takeScreenshot: maestro/screenshots/test5-13-signed-out-reset

# ════════════════════════════════════════════════════════════════════════════
# STEP 14 — Navigate back to Home
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    text: "Back"

- waitForAnimationToEnd:
    timeout: 1500

- assertVisible:
    text: "K SCAN AI"

- takeScreenshot: maestro/screenshots/test5-14-home-final
