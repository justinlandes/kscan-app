# ─────────────────────────────────────────────────────────────────────────────
# Maestro Test 4: Style Library — open, verify empty/saved state, reopen scan
# K Scan AI — Android (emulator-5554)
# ─────────────────────────────────────────────────────────────────────────────
#
# WHAT THIS PROVES:
#   The LIBRARY button is visible on the camera screen, tapping it navigates to
#   the Style Library screen, the correct state (empty or saved scan) is shown,
#   and (if a saved scan exists) tapping a card reopens the AnalysisCard without
#   triggering a backend call. Scan Again returns to the library cleanly.
#
# PREREQUISITES:
#   Test 3 (full scan pipeline) passed at least once so a saved scan exists.
#   If the library is empty, only the empty-state path runs — that is valid too.
#
# RUN:
#   maestro test maestro/flows/04-library.yaml
#
# SELECTOR NOTES:
#   library-button  — testID on the Library TouchableOpacity in app.js
#   scan-card       — testID on each ScanCard TouchableOpacity in library.tsx
#   analysis-card   — testID on AnalysisCard (same as test 3)
# ─────────────────────────────────────────────────────────────────────────────

appId: com.kscanai.app
---

# ════════════════════════════════════════════════════════════════════════════
# STEP 1 — Launch and arrive at camera screen
# ════════════════════════════════════════════════════════════════════════════
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 15000

- assertVisible:
    id: "scan-button"

- takeScreenshot: maestro/screenshots/test4-01-camera-ready

# ════════════════════════════════════════════════════════════════════════════
# STEP 2 — Library button visible, tap to open
# ════════════════════════════════════════════════════════════════════════════
- assertVisible:
    id: "library-button"

- tapOn:
    id: "library-button"

- waitForAnimationToEnd:
    timeout: 2000

# Library screen header must be visible
- assertVisible:
    text: "STYLE LIBRARY"

- takeScreenshot: maestro/screenshots/test4-02-library-open

# ════════════════════════════════════════════════════════════════════════════
# STEP 3 — Empty state OR saved scan card
# ════════════════════════════════════════════════════════════════════════════
# Both paths are valid; test adapts to whichever state exists.

- runFlow:
    when:
      visible:
        text: "Your Style Library is empty."
    commands:
      - assertVisible:
          text: "Scan your first look."
      - takeScreenshot: maestro/screenshots/test4-03a-empty-state

- runFlow:
    when:
      visible:
        id: "scan-card"
    commands:
      # ── Tap a saved scan card ──────────────────────────────────────────────
      - tapOn:
          id: "scan-card"

      - waitForAnimationToEnd:
          timeout: 1500

      # AnalysisCard must appear without any backend request
      - assertVisible:
          id: "analysis-card"

      - assertVisible:
          text: "Style Analysis"

      - assertVisible:
          text: "Scan Again"

      # Confirm real data — not a dev fallback stub
      - assertNotVisible:
          text: "[DEV FALLBACK]"

      - takeScreenshot: maestro/screenshots/test4-03b-reopened-scan

      # ── Close reopened scan ────────────────────────────────────────────────
      - tapOn:
          text: "Scan Again"

      - waitForAnimationToEnd:
          timeout: 1500

      - assertNotVisible:
          id: "analysis-card"

      # Must return to library, not camera
      - assertVisible:
          text: "STYLE LIBRARY"

      - takeScreenshot: maestro/screenshots/test4-04-back-to-library

# ════════════════════════════════════════════════════════════════════════════
# STEP 4 — Navigate back to camera screen
# ════════════════════════════════════════════════════════════════════════════
- tapOn:
    text: "←"

- waitForAnimationToEnd:
    timeout: 1500

# Camera screen must be restored
- assertVisible:
    id: "scan-button"

- assertNotVisible:
    text: "STYLE LIBRARY"

- takeScreenshot: maestro/screenshots/test4-05-back-to-camera
