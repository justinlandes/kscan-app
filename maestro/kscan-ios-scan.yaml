# iOS smoke test for K Scan AI.
# Run after a fresh iOS sim or device install.
appId: com.kscanai.app
name: "iOS Scan - Smoke"
tags:
  - ios
  - smoke
  - scan
---
- launchApp

# iOS system camera permission dialog — only on first install.
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd:
          timeout: 1500

# Camera screen must be live before proceeding.
- extendedWaitUntil:
    visible:
      id: "scan-button"
    timeout: 15000

- assertVisible:
    id: "scan-button"

- takeScreenshot: maestro/screenshots/ios-01-camera-ready

# Capture photo (idle → capturing → preview)
- tapOn:
    id: "scan-button"

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    text: "Look Analyzer"

- assertVisible:
    text: "Analyze Style"

- takeScreenshot: maestro/screenshots/ios-02-preview

# Trigger analysis (preview → processing)
- tapOn:
    text: "Analyze Style"

- extendedWaitUntil:
    visible:
      text: "Analyzing your look"
    timeout: 5000

- assertVisible:
    text: "Analyzing your look"

- takeScreenshot: maestro/screenshots/ios-03-processing

# Wait for AnalysisCard (processing → perceiving HUD → result)
# 30 s covers: inference (5-15 s) + 600 ms min delay + ~1460 ms double HUD
- extendedWaitUntil:
    visible:
      id: "analysis-card"
    timeout: 30000

- assertVisible:
    id: "analysis-card"

- assertVisible:
    text: "Style Analysis"

- assertVisible:
    text: "Scan Again"

- assertNotVisible:
    text: "[DEV FALLBACK]"

- takeScreenshot: maestro/screenshots/ios-04-result

# Reset
- tapOn:
    text: "Scan Again"

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible:
    id: "scan-button"

- assertNotVisible:
    id: "analysis-card"

- takeScreenshot: maestro/screenshots/ios-05-reset
