services:
  - type: web
    name: kscan-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected automatically by Render — do NOT add it here.
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-4-scout
      - key: USE_OPENROUTER
        value: "true"
      - key: CORS_ORIGIN
        value: "*"
      - key: KSCAN_LOG_MATCH
        value: "true"
